name: 🛸 Track ISS Location

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:          # Manual trigger too

jobs:
  track-iss:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🛸 Fetch ISS location & save it
        run: python track_iss.py

      - name: 💾 Commit data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iss_log.json iss_latest.json
          git diff --staged --quiet || git commit -m "🛸 ISS tracked at $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push